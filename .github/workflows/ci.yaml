name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'release/**'
      - main
  pull_request:
    branches:
      - develop
      - 'release/**'
      - main

jobs:
  versioning:
    uses: laboratorio-net/actions/.github/workflows/git-version.yaml@v1

  setup:
    runs-on: ubuntu-latest
    needs: [versioning]
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Set version output
        id: set_version
        run: echo "version=${{ needs.versioning.outputs.version }}" >> $GITHUB_OUTPUT

  build_python:
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install webapi dependencies
        run: pip install -r src/webapi/requirements.txt
      - name: Install worker dependencies
        run: pip install -r src/worker_app/requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov hypothesis opentelemetry-sdk flake8
      - name: Lint with flake8
        run: flake8 src/ --max-line-length=120

  tests:
    runs-on: ubuntu-latest
    needs: [build_python]
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install webapi dependencies
        run: pip install -r src/webapi/requirements.txt
      - name: Install worker dependencies
        run: pip install -r src/worker_app/requirements.txt
      - name: Install test dependencies
        run: pip install pytest pytest-cov hypothesis opentelemetry-sdk httpx
      - name: Run tests
        run: pytest src/tests/

  build_webapi:
    runs-on: ubuntu-latest
    needs: [setup, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build webapi Docker image
        run: docker build -f src/webapi/Dockerfile --build-arg VERSION=${{ needs.setup.outputs.version }} -t processador-cupom-webapi:${{ needs.setup.outputs.version }} .

  build_worker:
    runs-on: ubuntu-latest
    needs: [setup, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build worker Docker image
        run: docker build -f src/worker_app/Dockerfile --build-arg VERSION=${{ needs.setup.outputs.version }} -t processador-cupom-worker:${{ needs.setup.outputs.version }} .

  publish_webapi:
    needs: [setup, build_webapi, build_worker]
    uses: laboratorio-net/actions/.github/workflows/docker-build-publish.yaml@v1
    with:
      context: .
      dockerfile: src/webapi/Dockerfile
      username: ${{ vars.DOCKERHUB_USERNAME }}
      image-name: ${{ vars.DOCKERHUB_USERNAME }}/processador-cupom-webapi
      version: ${{ needs.setup.outputs.version }}
    secrets:
      usertoken: ${{ secrets.DOCKERHUB_TOKEN }}

  publish_worker:
    needs: [setup, build_webapi, build_worker]
    uses: laboratorio-net/actions/.github/workflows/docker-build-publish.yaml@v1
    with:
      context: .
      dockerfile: src/worker_app/Dockerfile
      username: ${{ vars.DOCKERHUB_USERNAME }}
      image-name: ${{ vars.DOCKERHUB_USERNAME }}/processador-cupom-worker
      version: ${{ needs.setup.outputs.version }}
    secrets:
      usertoken: ${{ secrets.DOCKERHUB_TOKEN }}

  create_tag:
    needs: [setup, publish_webapi, publish_worker]
    uses: laboratorio-net/actions/.github/workflows/create-tag.yaml@v1
    with:
      version: ${{ needs.setup.outputs.version }}

  release_notes:
    runs-on: ubuntu-latest
    needs: [setup, create_tag]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GB_TOKEN }}
