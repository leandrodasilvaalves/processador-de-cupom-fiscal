services:
  iniciador:
    image: ubuntu:22.04
    container_name: ${CONTAINER_PREFIX}.iniciador
    networks:
      - cupom-fiscal-dev
    cpus: 0.1
    mem_limit: 64M
    volumes:
      - ./pdf-files:/pdf-files
      - ./scripts/load-pending-files.sh:/script.sh
    entrypoint: ["/bin/bash", "/script.sh"]
    user: "${UID}:${GID}" # Executa com o UID e GID do usuário host
    

  webapi:
    build:
      context: .
      dockerfile: src/webapi/Dockerfile
    container_name: ${CONTAINER_PREFIX}.api.processador
    image: leandroalves86/api.processador-de-cupom-fiscal:${TAG_VERSION:-latest}
    ports:
      - "8081:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: '${MYSQL_DATABASE}'
      MYSQL_USER: '${MYSQL_USER}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
      MYSQL_PORT: ${MYSQL_PORT}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana:4318
      OTEL_SERVICE_NAME: webapi
      OTEL_DEPLOYMENT_ENVIRONMENT: development
      OTEL_ENABLED: true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cupom-fiscal-dev
    volumes:
      - ./pdf-files:/app/pdf-files
    cpus: 0.25
    mem_limit: 128M
    restart: always
    
  
  worker_app:
    build:
      context: .
      dockerfile: src/worker_app/Dockerfile
    container_name: ${CONTAINER_PREFIX}.processador
    image: leandroalves86/worker.processador-de-cupom-fiscal:${TAG_VERSION:-latest}
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: '${MYSQL_DATABASE}'
      MYSQL_USER: '${MYSQL_USER}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
      MYSQL_PORT: ${MYSQL_PORT}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana:4318
      OTEL_SERVICE_NAME: worker_app
      OTEL_DEPLOYMENT_ENVIRONMENT: development
      OTEL_ENABLED: true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cupom-fiscal-dev
    volumes:
      - ./pdf-files:/app/pdf-files
    cpus: 0.25
    mem_limit: 128M
      

  mysql:
    image: mysql:8.0-debian
    container_name: ${CONTAINER_PREFIX}.mysql
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD}'
      MYSQL_DATABASE: '${MYSQL_DATABASE}'
      MYSQL_USER: '${MYSQL_USER}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD}'
      MYSQL_TCP_PORT: ${MYSQL_PORT}
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=root"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cupom-fiscal-dev
    cpus: 0.3
    mem_limit: 256M
    restart: always


  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: ${CONTAINER_PREFIX}.phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: ${MYSQL_PORT}
      PMA_USER: '${MYSQL_USER}'
      PMA_PASSWORD: '${MYSQL_PASSWORD}'
      PMA_ARBITRARY: 1
    depends_on:
      mysql:
        condition: service_healthy  
    networks:
      - cupom-fiscal-dev
    cpus: 0.25
    mem_limit: 128M
    restart: always

  grafana:
    image: grafana/otel-lgtm:0.6.0
    container_name: ${CONTAINER_PREFIX}.grafana-otel-lgtm
    ports:
      - 3110:3000
      - 4327:4317
      - 4328:4318
    environment:
      - OTEL_METRIC_EXPORT_INTERVAL=1000
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    mem_limit: 200M
    cpus: 0.25
    networks:
      - cupom-fiscal-dev


networks:
  cupom-fiscal-dev:
    driver: bridge